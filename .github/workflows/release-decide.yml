# Decide-Org release pipeline: build all platforms → GitHub Release
#
# Simplified variant of upstream release.yml. Requires only GITHUB_TOKEN.
# No VirusTotal, npm, PyPI, or MCP-registry steps.
name: Release (Decide-Org)

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. v0.8.0)"
        required: true
        type: string
      release_notes:
        description: "Release notes (optional — auto-generated from commits if empty)"
        required: false
        type: string
      replace:
        description: "Replace existing release if it already exists"
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  # ── Build all platforms ─────────────────────────────────────────
  build:
    uses: ./.github/workflows/_build.yml
    with:
      version: ${{ inputs.version }}

  # ── Create GitHub Release ───────────────────────────────────────
  release:
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          merge-multiple: true

      - name: List artifacts
        run: ls -la *.tar.gz *.zip 2>/dev/null || ls -la

      - name: Generate checksums
        run: sha256sum *.tar.gz *.zip 2>/dev/null > checksums.txt || sha256sum *.tar.gz > checksums.txt

      - name: Delete existing release
        if: ${{ inputs.replace }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ inputs.version }}
        run: gh release delete "$VERSION" --yes --cleanup-tag || true

      - name: Create tag
        env:
          VERSION: ${{ inputs.version }}
        run: |
          git tag -f "$VERSION" "$GITHUB_SHA"
          git push origin "$VERSION" --force

      - uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v2
        with:
          tag_name: ${{ inputs.version }}
          draft: false
          files: |
            *.tar.gz
            *.zip
            checksums.txt
          body: ${{ inputs.release_notes || '' }}
          generate_release_notes: ${{ inputs.release_notes == '' }}
